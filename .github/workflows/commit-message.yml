name: commit-message-policy

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/git/validate-commit-range.mjs "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
          else
            node scripts/git/validate-commit-range.mjs "${{ github.event.before }}" "${{ github.sha }}"
          fi

